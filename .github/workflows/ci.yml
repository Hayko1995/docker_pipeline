name: Docker Build, Test, and Deploy Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # --- AWS ECR Future Setup ---
  # AWS_REGION: us-east-1
  # ECR_REPOSITORY: my-app-repository
  VERSION: "0.0.${{ github.run_number }}"
  APP_IMAGE: my-app-image

jobs:
  # ----------------------------------------
  # STEP 1: BUILD
  # ----------------------------------------
  build:
    name: Build
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          # Build locally on your Mac
          docker build -t $APP_IMAGE:latest -t $APP_IMAGE:$VERSION .

  # ----------------------------------------
  # STEP 2: TEST
  # ----------------------------------------
  test:
    name: Test
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Tests
        run: |
          # Uses the locally built image
          docker run --rm $APP_IMAGE:$VERSION python -c "print('Running Tests on local runner...')"

  # ----------------------------------------
  # STEP 3: DEPLOY
  # ----------------------------------------
  deploy:
    name: Deploy
    needs: [build, test]
    # Only deploy on pushes to main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

