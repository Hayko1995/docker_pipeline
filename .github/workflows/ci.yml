name: Docker Build, Test, and Deploy Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------------------------
  # STEP 1: BUILD
  # ----------------------------------------
  build:
    name: Build
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t my-app-image:latest .
          # In the future: Log in and push to registry here

  # ----------------------------------------
  # STEP 2: TEST
  # ----------------------------------------
  test:
    name: Test
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Tests
        run: |
          # Note: Since this is a new runner, we rebuild for now.
          # In the future: Pull the image from your registry instead.
          docker build -t my-app-image:latest .
          docker run --rm my-app-image:latest python -c "print('Running Tests on local runner...')"

